# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# Run locally with: cargo deny check

[advisories]
# Fail on any security advisory affecting a dependency, and on yanked crates.
yanked = "deny"
ignore = []

[licenses]
# Allow-list derived from the crates actually in Cargo.lock. SPDX OR-expressions
# are satisfied if any one allowed license matches; AND-expressions (e.g.
# `(MIT OR Apache-2.0) AND Unicode-3.0`) require every term, which is why
# Unicode-3.0 must be present. GPL-3.0-or-later covers this project's own crates.
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "GPL-3.0-or-later",
]

[bans]
# A new vuln often hides in a duplicated transitive version, so surface them.
multiple-versions = "warn"
# A wildcard version requirement is a supply-chain footgun.
wildcards = "deny"

[sources]
# Everything must come from crates.io; no unvetted registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
